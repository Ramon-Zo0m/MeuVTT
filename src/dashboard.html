<!DOCTYPE html>
<html>
<head>
    <title>Painel do Mestre</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; background: #222; color: white; font-family: sans-serif; }
        #sidebar { width: 300px; padding: 10px; background: #333; display: flex; flex-direction: column; border-right: 2px solid #000; gap: 10px; }
        #main { flex: 1; display: flex; flex-direction: column; }
        #preview-container { flex: 1; background: #000; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        
        .section-title { color: #aaa; font-size: 12px; margin-top: 10px; border-bottom: 1px solid #555; font-weight: bold; }
        .item-list { overflow-y: auto; max-height: 200px; display: flex; flex-direction: column; gap: 2px; }
        button { cursor: pointer; background: #444; color: white; border: 1px solid #555; padding: 5px; }
        button:hover { background: #555; }
        .asset-btn { display: flex; align-items: center; gap: 10px; padding: 5px; background: #3a3a3a; cursor: pointer; }
        .asset-btn:hover { background: #505050; }
        .thumb { width: 40px; height: 40px; object-fit: contain; background: #000; border-radius: 4px; }
        #dynamic-categories { display: flex; flex-direction: column; gap: 5px; overflow-y: auto; flex: 1; }
        .category-group { border: 1px solid #444; padding: 5px; border-radius: 5px; background: #2a2a2a; }
        .category-btn { width: 100%; text-align: left; font-weight: bold; background: #222; margin-bottom: 5px; }
        #ip-display { background: #004400; padding: 10px; border-radius: 5px; text-align: center; font-weight: bold;}
        
        #btnLock { font-weight: bold; padding: 10px; border-radius: 5px; border: none; }
        .unlocked { background-color: #28a745; color: white; }
        .locked { background-color: #dc3545; color: white; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div id="ip-display">Carregando IP...</div>
        
        <button id="btnLock" class="unlocked" onclick="toggleLock()">🔓 MOVIMENTAÇÃO LIBERADA</button>

        <div style="display: flex; gap: 5px;">
            <button onclick="salvarCena()" style="flex:1; background: #0055aa;">💾 Salvar</button>
            <button onclick="limparMesa()" style="flex:1; background: #aa0000;">🗑️ Limpar</button>
        </div>

        <div class="section-title">CENAS SALVAS</div>
        <button onclick="carregarLista('Cenas', 'cena', 'lista-cenas')">🔄 Atualizar Cenas</button>
        <div id="lista-cenas" class="item-list" style="max-height: 100px;"></div>

        <div class="section-title">MAPAS</div>
        <button onclick="carregarLista('Maps', 'map', 'lista-mapas')">🔄 Atualizar Mapas</button>
        <div id="lista-mapas" class="item-list" style="max-height: 120px;"></div>

        <div class="section-title">TOKENS (PASTAS)</div>
        <div id="dynamic-categories"></div>
    </div>

    <div id="main">
        <iframe id="preview" src="http://localhost:3000"></iframe>
    </div>

    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script>
        const { ipcRenderer } = require('electron');
        const socket = io('http://localhost:3000');

        ipcRenderer.invoke('get-ip').then(ip => {
            document.getElementById('ip-display').innerHTML = `IP: <span style="color:lime">${ip}:3000</span>`;
        });

        function toggleLock() { socket.emit('gm_toggle_lock'); }

        socket.on('init_state', (state) => atualizarBotaoLock(state.playersLocked));
        socket.on('update_lock_state', (isLocked) => atualizarBotaoLock(isLocked));

        function atualizarBotaoLock(locked) {
            const btn = document.getElementById('btnLock');
            if (locked) { btn.innerText = "🔒 TRAVADO"; btn.className = "locked"; }
            else { btn.innerText = "🔓 LIBERADO"; btn.className = "unlocked"; }
        }

        ipcRenderer.on('folders-updated', () => {
            carregarCategoriasTokens();
            carregarLista('Cenas', 'cena', 'lista-cenas'); // Atualiza cenas também
        });

        async function carregarCategoriasTokens() {
            const container = document.getElementById('dynamic-categories');
            const pastas = await ipcRenderer.invoke('get-files', 'Tokens');
            container.innerHTML = '';
            if(pastas.length === 0) { container.innerHTML = '<div style="color:#aaa;">Vazio</div>'; return; }

            pastas.forEach(pastaNome => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'category-group';
                const titleBtn = document.createElement('button');
                titleBtn.className = 'category-btn';
                titleBtn.innerHTML = `📂 ${pastaNome}`;
                const contentDiv = document.createElement('div');
                contentDiv.className = 'item-list';
                contentDiv.style.display = 'none';
                
                titleBtn.onclick = () => {
                    const isHidden = contentDiv.style.display === 'none';
                    document.querySelectorAll('#dynamic-categories .item-list').forEach(d => d.style.display = 'none');
                    if(isHidden) { contentDiv.style.display = 'flex'; carregarLista(`Tokens/${pastaNome}`, 'token', contentDiv); }
                };
                groupDiv.appendChild(titleBtn); groupDiv.appendChild(contentDiv); container.appendChild(groupDiv);
            });
        }

        async function carregarLista(pasta, tipo, targetElementOrId) {
            const arquivos = await ipcRenderer.invoke('get-files', pasta);
            let container = typeof targetElementOrId === 'string' ? document.getElementById(targetElementOrId) : targetElementOrId;
            container.innerHTML = '';
            arquivos.forEach(file => {
                const btn = document.createElement('div');
                btn.className = 'asset-btn';
                const serverUrl = `/assets/${pasta}/${file}`;
                
                if (tipo === 'cena') {
                    btn.innerHTML = `🎬 ${file.replace('.json', '')}`;
                    btn.onclick = () => carregarCena(file);
                } else {
                    btn.innerHTML = `<img src="../assets/${pasta}/${file}" class="thumb"> <span>${file.substring(0, 12)}...</span>`;
                    btn.onclick = () => {
                        if(tipo === 'map') socket.emit('gm_change_map', serverUrl);
                        else socket.emit('gm_add_token', { id: 'tk_'+Date.now(), x: 400, y: 300, img: serverUrl });
                    };
                }
                container.appendChild(btn);
            });
        }

        // --- SALVAMENTO COM FEEDBACK ---
        async function salvarCena() {
            const nome = prompt("Nome da Cena (ex: Batalha Final):");
            if (nome) { 
                const resposta = await ipcRenderer.invoke('save-scene', nome);
                if (resposta.success) {
                    alert("✅ Cena Salva com Sucesso!");
                    carregarLista('Cenas', 'cena', 'lista-cenas');
                } else {
                    alert("❌ Erro ao salvar: " + resposta.error);
                }
            }
        }

        async function carregarCena(arq) {
            if(confirm(`Carregar ${arq}?`)) { await ipcRenderer.invoke('load-scene', arq); document.getElementById('preview').src = document.getElementById('preview').src; }
        }
        function limparMesa() { if(confirm("Limpar tudo?")) socket.emit('gm_clear_all'); }

        setTimeout(() => { carregarLista('Cenas', 'cena', 'lista-cenas'); carregarLista('Maps', 'map', 'lista-mapas'); carregarCategoriasTokens(); }, 500);
    </script>
</body>
</html>
